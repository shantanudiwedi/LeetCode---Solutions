name: Sort

on:
  push:

jobs:
  sort:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Sort files
        run: |
          mkdir -p Easy Medium Hard

          for file in *.py; do
            [ -e "$file" ] || continue
            mv "$file" Medium/
          done

      - name: Commit
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add .
          git commit -m "sorted" || exit 0
          git push
