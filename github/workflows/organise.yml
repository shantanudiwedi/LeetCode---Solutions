name: Organize LeetCode by Difficulty

on:
  push:
    branches: [main]

jobs:
  sort:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Organize files
        run: |
          mkdir -p Easy Medium Hard
          for file in *.py *.java *.cpp; do
            [ -e "$file" ] || continue
            if grep -q "Easy" "$file"; then
              mv "$file" Easy/
            elif grep -q "Medium" "$file"; then
              mv "$file" Medium/
            elif grep -q "Hard" "$file"; then
              mv "$file" Hard/
            fi
          done

      - name: Commit changes
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add .
          git commit -m "auto organize" || exit 0
          git push
